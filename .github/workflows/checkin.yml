name: Auto Checkin

on:
  schedule:
    - cron: '51 5 * * *'
    - cron: '53 7 * * *'
    - cron: '55 10 * * *'
    - cron: '55 12 * * *'
  workflow_dispatch:

jobs:
  checkin:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm install playwright
          npx playwright install chromium
          npx playwright install-deps chromium

      - name: Run Checkin
        env:
          CHECKIN_SITES: ${{ secrets.CHECKIN_SITES }}
          SERVERCHAN_KEY: ${{ secrets.SERVERCHAN_KEY }}
        run: |
          node << 'EOF'
          const { chromium } = require('playwright');
          const https = require('https');

          const SITES = JSON.parse(process.env.CHECKIN_SITES || '[]');
          const SERVERCHAN_KEY = process.env.SERVERCHAN_KEY || '';

          async function sendNotification(title, content) {
            if (!SERVERCHAN_KEY) return;
            return new Promise((resolve) => {
              try {
                const postData = `title=${encodeURIComponent(title)}&desp=${encodeURIComponent(content)}`;
                const req = https.request({
                  hostname: 'sctapi.ftqq.com',
                  path: `/${SERVERCHAN_KEY}.send`,
                  method: 'POST',
                  headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                    'Content-Length': Buffer.byteLength(postData)
                  }
                }, () => resolve());
                req.on('error', () => resolve());
                req.write(postData);
                req.end();
                console.log('📨 微信通知已发送');
              } catch(e) {
                console.log('📨 通知发送失败:', e.message);
                resolve();
              }
            });
          }

          async function checkinSite(browser, site) {
            console.log(`\n📌 ${site.name}  ${site.url}`);
            try {
              const context = await browser.newContext({
                viewport: { width: 1920, height: 1080 },
                locale: 'zh-CN',
                userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36',
                extraHTTPHeaders: { 'Accept-Language': 'zh-CN,zh;q=0.9,en;q=0.8' }
              });

              const page = await context.newPage();
              await page.goto(site.url + '/login', { timeout: 60000, waitUntil: 'domcontentloaded' });
              await page.waitForTimeout(5000);

              const title = await page.title();
              if (title.includes('Just a moment')) {
                console.log('⚠️ Cloudflare 验证中，等待...');
                await page.waitForTimeout(15000);
              }

              const emailInput = await page.$('input[type="email"]');
              const userInput = await page.$('input[placeholder*="邮箱"], input[placeholder*="账号"], input[name="username"]');
              const passInput = await page.$('input[type="password"]');

              if (emailInput) {
                await emailInput.fill(site.username);
                await emailInput.press('Tab');
              } else if (userInput) {
                await userInput.fill(site.username);
                await userInput.press('Tab');
              }
              if (passInput) {
                await passInput.fill(site.password);
                await passInput.press('Tab');
              }

              await page.waitForTimeout(2000);

              // 等待登录按钮可点击再点
              try {
                const submitBtn = await page.waitForSelector('button[type="submit"]:not([disabled])', { timeout: 15000 });
                await submitBtn.click();
                console.log('🔄 点击登录...');
              } catch(e) {
                const submitBtn = await page.$('button[type="submit"]');
                if (submitBtn) await submitBtn.click();
                console.log('🔄 点击登录（强制）...');
              }

              await page.waitForTimeout(8000);

              const userInfo = await page.evaluate(() => {
                try {
                  const user = localStorage.getItem('user');
                  return user ? JSON.parse(user) : null;
                } catch(e) { return null; }
              });

              if (userInfo?.id) console.log(`✅ 用户ID: ${userInfo.id}`);

              // 签到
              const response = await page.evaluate(async (userId) => {
                try {
                  const headers = userId ? { 'New-Api-User': String(userId) } : {};
                  const res = await fetch('/api/user/checkin', { method: 'POST', headers });
                  return await res.json();
                } catch(e) { return { error: e.toString() }; }
              }, userInfo?.id);

              const msg = response.message || response.msg || JSON.stringify(response);
              const checkinOk = response.success || msg.includes('成功') || msg.includes('已签到');
              console.log(checkinOk ? `✅ 签到: ${msg}` : `❌ 签到: ${msg}`);

              // 签到后查询余额
              const selfInfo = await page.evaluate(async (userId) => {
                try {
                  const headers = userId ? { 'New-Api-User': String(userId) } : {};
                  const res = await fetch('/api/user/self', { method: 'GET', headers });
                  return await res.json();
                } catch(e) { return { error: e.toString() }; }
              }, userInfo?.id);

              let balanceStr = '';
              if (selfInfo?.data) {
                const quota = selfInfo.data.quota ?? selfInfo.data.balance ?? null;
                const used = selfInfo.data.used_quota ?? null;
                if (quota !== null) {
                  const balance = (quota / 500000).toFixed(4);
                  const usedAmount = used !== null ? (used / 500000).toFixed(4) : '未知';
                  balanceStr = `$${balance}`;
                  console.log(`💰 签到后余额: $${balance}  |  历史消耗: $${usedAmount}`);
                }
              }

              await context.close();
              return { name: site.name, username: site.username, ok: checkinOk, msg, balance: balanceStr };
            } catch(e) {
              console.log(`❌ 失败: ${e.message}`);
              return { name: site.name, username: site.username, ok: false, msg: e.message, balance: '' };
            }
          }

          async function main() {
            console.log('🚀 自动签到...');
            console.log(`⏰ 北京时间 ${new Date().toLocaleString('zh-CN', {timeZone: 'Asia/Shanghai'})}`);

            const browser = await chromium.launch({
              headless: true,
              args: ['--no-sandbox', '--disable-dev-shm-usage', '--disable-blink-features=AutomationControlled', '--window-size=1920,1080']
            });

            // 并发执行，每批10个
            const results = [];
            const batchSize = 10;
            for (let i = 0; i < SITES.length; i += batchSize) {
              const batch = SITES.slice(i, i + batchSize);
              const batchResults = await Promise.all(batch.map(site => checkinSite(browser, site)));
              results.push(...batchResults);
            }

            await browser.close();

            const success = results.filter(r => r.ok).length;
            const failed = results.filter(r => !r.ok).length;
            console.log(`\n📊 签到完成: ✅ ${success} 成功, ❌ ${failed} 失败`);

            // 发送微信通知
            const time = new Date().toLocaleString('zh-CN', {timeZone: 'Asia/Shanghai'});
            let content = `## ⏰ ${time}\n\n| 站点 | 账号 | 签到 | 余额 |\n|---|---|---|---|\n`;
            for (const r of results) {
              const icon = r.ok ? '✅' : '❌';
              content += `| ${r.name} | ${r.username} | ${icon} ${r.msg} | ${r.balance} |\n`;
            }
            content += `\n**✅ ${success} 成功 / ❌ ${failed} 失败**`;
            await sendNotification(`🎯 签到报告 ${success}成功 ${failed}失败`, content);
          }

          main().catch(console.error);
          EOF
