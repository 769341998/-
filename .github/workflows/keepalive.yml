name: Keepalive

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Keepalive
        run: |
          echo "Last keepalive: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" > .keepalive
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add .keepalive
          git diff --quiet && git commit -m "chore: keepalive $(date -u '+%Y-%m-%d')" || echo "No changes"
          git push
